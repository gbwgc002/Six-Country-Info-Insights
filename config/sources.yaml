# WayToAGI 每日知识库精选（自定义爬虫，无 RSS）
waytoagi:
  enabled: true
  max_items: 8  # 每日约 5-7 条，设置稍宽

# arXiv 论文配置
arxiv:
  enabled: true
  categories:
    - "cs.AI"   # Artificial Intelligence
    - "cs.LG"   # Machine Learning
    - "cs.CL"   # Computation and Language (NLP)
    - "cs.CV"   # Computer Vision
  max_results: 20
  # 按热度过滤 (可选)
  min_score: 0  # 0表示不过滤

# X/Twitter 替代方案配置
twitter:
  enabled: false  # Disabled due to Nitter instability
  method: "nitter"  # nitter | rss_bridge | manual

  # 关注的账号 (通过 Nitter RSS) - AI主要布道者
  accounts:
    # AI公司创始人/CEO
    - username: "sama"
      name: "Sam Altman (OpenAI CEO)"
    - username: "gaborbrigs"
      name: "Dario Amodei (Anthropic CEO)"
    - username: "satlomat"
      name: "Satya Nadella (Microsoft CEO)"
    - username: "sundarpichai"
      name: "Sundar Pichai (Google CEO)"

    # AI研究先驱
    - username: "ylecun"
      name: "Yann LeCun (Meta AI Chief)"
    - username: "demaboris"
      name: "Andrej Karpathy (Ex-Tesla/OpenAI)"
    - username: "JeffDean"
      name: "Jeff Dean (Google)"
    - username: "goodfloow"
      name: "Ian Goodfellow (DeepMind)"
    - username: "ilyasut"
      name: "Ilya Sutskever (SSI)"

    # AI意见领袖/投资人
    - username: "emaboris"
      name: "Emad Mostaque (Stability AI)"
    - username: "elaboris"
      name: "Elon Musk (xAI)"
    - username: "naval"
      name: "Naval Ravikant"
    - username: "garrytan"
      name: "Garry Tan (YC)"

    # AI开发者/创作者
    - username: "swyx"
      name: "Swyx (AI Engineer)"
    - username: "simonw"
      name: "Simon Willison"
    - username: "kaborashid"
      name: "Kaif Rashid"
    - username: "DrJimFan"
      name: "Jim Fan (NVIDIA)"
    - username: "LangChainAI"
      name: "LangChain"

  # 搜索关键词 (如果 Nitter 支持)
  search_terms:
    - "AI breakthrough"
    - "LLM"
    - "GPT"
    - "Claude"

  # Nitter 实例列表 (会自动尝试可用的)
  nitter_instances:
    - "https://nitter.privacyredirect.com"
    - "https://xcancel.com"
    - "https://nitter.poast.org"
    - "https://nitter.tiekoetter.com"
    - "https://nitter.catsarch.com"
    - "https://nitter.privacy.com.de"
    - "https://nitter.moomoo.me"
    - "https://nitter.perennialte.ch"

# Hacker News 热门 AI 讨论
hackernews:
  enabled: true
  url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+GPT+OR+Claude"
  min_points: 1  # Lowered to 1 to catch newest items (we filter by AI relevance later)
  max_items: 10

# 输出配置
output:
  # 每个分类最多显示多少条 (增加此值以容纳更多来源，特别是Podcast)
  max_per_category: 20

  # 分类显示顺序
  category_order:
    - "big_tech"
    - "phone_ai"
    - "papers"
    - "newsletter"
    - "industry"
    - "podcast"
    - "social"
    - "china"

  # 分类中文名
  category_names:
    big_tech: "🏢 大厂动态"
    phone_ai: "📱 手机AI动态"
    papers: "📄 前沿论文"
    newsletter: "📬 Newsletter精选"
    industry: "💰 行业投融资"
    podcast: "🎙️ 播客更新"
    social: "🐦 社交热议"
    china: "🇨🇳 国内动态"

# 发布渠道配置
publishers:
  feishu:
    enabled: true
    title_format: "🤖 AI Daily Digest - {date}"
    # Credentials (FEISHU_APP_ID, FEISHU_APP_SECRET) loaded from env vars

  feishu_bot:
    enabled: true
    # Target chat ID (group ID starting with oc_) loaded from FEISHU_BOT_CHAT_ID
    # or can be set here directly if not secret
    chat_id: ""
    title_format: "🤖 AI Daily Digest - {date}"
