name: AI Daily Digest

on:
  # 每天北京时间早上8点运行 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'

  # 手动触发
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # WeasyPrint dependencies
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info
          # Chinese fonts for PDF generation
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Daily Digest
        env:
          # Gemini (Vertex AI) service account JSON
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}

          # Email configuration (Gmail SMTP)
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.SMTP_USER }}
          TO_EMAIL: rillahai@gmail.com

          # Feishu Configuration
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BOT_CHAT_ID: ${{ secrets.FEISHU_BOT_CHAT_ID }}

        run: |
          python main.py

      - name: Upload debug log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: |
            *.log
            debug/
          retention-days: 7
